<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iPhone 17 Pro — Design Asset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,700;0,800;0,900;1,800&family=Space+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<section class="hero">

    <!-- Левая колонка -->
    <div class="left-col">

        <!-- Apple SVG logo -->
        <svg class="apple-logo" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-155.4-127.7C46.7 761.1 1 665.5 1 572.2 0 414.6 100.8 334.5 199.9 334.5c64.4 0 116.4 42.5 155.9 42.5 37.7 0 96.9-45 168.8-45 27.2 0 129.1 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>

        <h1 class="iphone-title">iPhone</h1>
        <p class="design-asset">Design &nbsp; Asset</p>

        <ul class="feature-list">
            <li>Status and home bar</li>
            <li>Camera Control</li>
            <li>Dynamic Island</li>
            <li>Mockups</li>
            <li>Wallpapers</li>
        </ul>
    </div>

    <!-- Правая колонка с фоном -->
    <div class="right-col">
        <img class="iphone-bg" src="iphone.jpg" alt="iPhone 17 Pro" />
        <div class="right-text">
            <p class="iphone17-label">iPhone 17</p>
            <h2 class="pro-title">PRO</h2>
        </div>
    </div>

</section>

</body>
</html>
